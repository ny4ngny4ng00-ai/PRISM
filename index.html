<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM ID card Studio</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Syncopate:wght@400;700&display=swap');

        :root {
            --card-bg: #101416;
            --card-accent: #5ab3b8; /* 포인트 요소 컬러 */
            --text-accent: #ffffff;  /* 텍스트 전용 컬러 */
            --panel-bg: #161b1e;
            --btn-bg: #2c343a;
            --label-color: #555c63;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a2634 0%, #0a0e14 100%);
            display: flex; flex-direction: column;
            font-family: 'Roboto', sans-serif; color: white;
            min-height: 100vh; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1;
        }

        .site-header { text-align: center; padding: 40px 0 20px 0; }
        .site-header h1 { font-family: 'Syncopate', sans-serif; font-size: 2rem; letter-spacing: 15px; margin: 0; color: #fff; }

        .main-container { display: flex; justify-content: center; align-items: flex-start; gap: 50px; padding: 20px; flex-wrap: wrap; }

        /* 설정 패널 */
        .controls {
            background: var(--panel-bg);
            padding: 30px; border-radius: 24px; display: flex; flex-direction: column; gap: 15px;
            width: 300px; border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .controls label { font-size: 11px; font-weight: 700; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .controls input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; border-radius: 8px; box-sizing: border-box; }
        
        /* 컬러 피커 라벨 강조 */
        .color-label { color: #aaa !important; font-size: 12px !important; margin-top: 5px; }

        .save-btn {
            background: var(--btn-bg); color: #fff; border: 1px solid #444; padding: 18px;
            font-weight: 700; font-size: 15px; border-radius: 12px; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase; margin-top: 10px;
        }
        .save-btn:hover { background: #3e4850; border-color: #666; }

        /* --------------------------------------------------
           카드 디자인
        ----------------------------------------------------- */
        #capture-area { padding: 10px; background-color: transparent; }

        .card {
            width: 340px; 
            background-color: var(--card-bg); border-radius: 20px;
            padding: 0 0 40px 0;
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .top-stripe { width: 100%; height: 12px; background-color: var(--card-accent); margin-bottom: 30px; }

        .card-content { padding: 0 35px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        
        /* [핵심] PRISM 텍스트 컬러 */
        .title-main { 
            font-size: 28px; font-weight: 700; letter-spacing: 4px; margin: 0; 
            color: var(--text-accent); 
        }
        .title-sub { font-size: 9px; letter-spacing: 1px; color: var(--label-color); margin-top: 3px; }
        
        /* [핵심] 랭크 텍스트 컬러 */
        .rank-circle { 
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--card-accent); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 18px; color: var(--text-accent); 
        }

        .image-container { 
            width: 160px; height: 234px; 
            border: 1px solid var(--label-color); margin: 0 auto 30px auto; position: relative; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
            background-color: #000;
        }
        #profile-img { width: 100%; height: 100%; object-fit: cover; }
        
        .deco { position: absolute; width: 8px; height: 8px; border: 2px solid var(--card-accent); }
        .tl { top: 6px; left: 6px; border-right: 0; border-bottom: 0; }
        .br { bottom: 6px; right: 6px; border-left: 0; border-top: 0; }

        .info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
        .info-item { border-left: 3px solid var(--card-accent); padding-left: 12px; }
        .info-label { font-size: 10px; color: var(--label-color); margin-bottom: 3px; }
        
        /* [핵심] 상세 값 컬러 */
        .info-value { font-size: 18px; font-weight: 700; color: var(--text-accent); }
        
        .footer { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .footer-text { font-size: 9px; color: var(--label-color); margin: 2px 0; }
        .footer-bar { width: 55px; height: 16px; margin-top: 8px; display: flex; gap: 2px; opacity: 0.8; }
        .bar-chunk { background-color: var(--card-accent); height: 100%; }

    </style>
</head>
<body>

    <header class="site-header">
        <h1>PRISM ID card</h1>
    </header>

    <div class="main-container">
        <div class="controls">
            <div><label>사진 업로드(832x1216 권장)</label><input type="file" id="in-img" accept="image/*"></div>
            
            <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
            
            <!-- 컬러 선택 분리 -->
            <div><label class="color-label">1. 카드 포인트 컬러 (테두리/바)</label><input type="color" id="in-card-color" value="#5ab3b8"></div>
            <div><label class="color-label">2. 메인 글자 컬러 (PRISM/값)</label><input type="color" id="in-text-color" value="#ffffff"></div>
            
            <hr style="border:0; border-top:1px solid #333; margin:10px 0;">

            <div><label>RANK</label><input type="text" id="in-rank" value="S" maxlength="1"></div>
            <div><label>RANK / TYPE</label><input type="text" id="in-v1" value="S / C-TYPE"></div>
            <div><label>CODENAME</label><input type="text" id="in-v2" value="ADAM"></div>
            <button class="save-btn" onclick="saveCard()">PNG 저장</button>
        </div>

        <div id="capture-area">
            <div class="card">
                <div class="top-stripe"></div>
                <div class="card-content">
                    <div class="card-header">
                        <div>
                            <h1 class="title-main">PRISM</h1>
                            <div class="title-sub">GENETIC CUSTODY DIVISION</div>
                        </div>
                        <div class="rank-circle" id="out-rank">S</div>
                    </div>

                    <div class="image-container">
                        <img src="" id="profile-img" style="display: none;">
                        <div class="deco tl"></div>
                        <div class="deco br"></div>
                    </div>

                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">RANK / TYPE</div>
                            <div class="info-value" id="out-v1">S / C-TYPE</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">CODENAMES</div>
                            <div class="info-value" id="out-v2">ADAM</div>
                        </div>
                    </div>

                    <div class="footer">
                        <div class="footer-text" id="out-verification">VERIFICATION: [ASSET_S / C-TYPE-ADAM]</div>
                        <div class="footer-text">GENETIC STABILITY MONITORING: ACTIVE</div>
                        <div class="footer-bar">
                            <div class="bar-chunk" style="width: 4px;"></div>
                            <div class="bar-chunk" style="width: 2px;"></div>
                            <div class="bar-chunk" style="width: 8px;"></div>
                            <div class="bar-chunk" style="width: 4px;"></div>
                            <div class="bar-chunk" style="width: 12px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 카드 포인트 컬러 변경 (테두리, 스트라이프 등)
        document.getElementById('in-card-color').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--card-accent', e.target.value);
        });

        // 2. 텍스트 전용 컬러 변경 (PRISM, 랭크문자, 상세값)
        document.getElementById('in-text-color').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--text-accent', e.target.value);
        });

        function updateVerification() {
            const v1 = document.getElementById('in-v1').value.toUpperCase();
            const v2 = document.getElementById('in-v2').value.toUpperCase();
            document.getElementById('out-verification').innerText = `VERIFICATION: [ASSET_${v1}-${v2}]`;
        }

        const syncText = (inId, outId) => {
            document.getElementById(inId).addEventListener('input', (e) => {
                document.getElementById(outId).innerText = e.target.value.toUpperCase();
                updateVerification();
            });
        };

        syncText('in-rank', 'out-rank');
        syncText('in-v1', 'out-v1');
        syncText('in-v2', 'out-v2');

        document.getElementById('in-img').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('profile-img');
                    img.src = event.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function saveCard() {
            const target = document.getElementById('capture-area');
            html2canvas(target, {
                backgroundColor: null,
                useCORS: true,
                scale: 3
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'PRISM-ID-CARD.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
